    - name: i18n-core
      instruction: |
        두 파일을 생성하세요:
        1. /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/lib/i18n.ts
        2. /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/language-selector.tsx

        ## 프로젝트 컨텍스트
        - Next.js 16+ App Router, TypeScript, Tailwind CSS
        - 타겟 언어: English(en), Spanish(es), Korean(ko)
        - localStorage key: "snapquote_language"

        ## lib/i18n.ts 시그니처
        export type Language = "en" | "es" | "ko"
        export type TranslationKey = keyof typeof translations.en

        export const translations: Record<Language, Record<string, string>>
        // 번역 키 목록 (최소 아래 포함):
        // new_estimate, history, clients, profile, home, receipts
        // send, save, copy, cancel, back, next, done
        // follow_up_needed, copy_message, open_email
        // speak_job, creating_estimate, estimate_ready
        // select_trade, send_instantly

        export function t(key: string, lang: Language): string
        export function getStoredLanguage(): Language
        export function setStoredLanguage(lang: Language): void
        export function useLanguage(): { lang: Language; setLang: (l: Language) => void; t: (key: string) => string }

        ## components/language-selector.tsx 시그니처
        export function LanguageSelector(): JSX.Element
        // 3개 버튼(EN/ES/KO) 토글 UI
        // useLanguage hook 사용
        // 현재 선택된 언어 강조 표시

        ## 요구사항
        - translations 객체: en/es/ko 3개 언어, 위 키 전부 포함
        - t(key, lang): 키 없으면 key 그대로 반환 (fallback)
        - getStoredLanguage: localStorage 없는 환경(SSR) 대비 try-catch 처리
        - useLanguage hook: useState + useEffect로 localStorage 동기화
        - LanguageSelector: "use client", 작은 pill 버튼 3개 (EN · ES · KO)

        ## 제약사항
        - 추가 i18n 라이브러리 설치 금지 (순수 TypeScript)
        - "use client"는 components/language-selector.tsx에만 선언
        - lib/i18n.ts는 서버/클라이언트 모두 호환 (localStorage는 함수 내부에서만)
        - TypeScript strict, any 금지

      gates:
        - name: "lib/i18n.ts 존재"
          command: "[ -f '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/lib/i18n.ts' ]"
        - name: "language-selector.tsx 존재"
