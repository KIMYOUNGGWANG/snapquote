    - name: time-estimate-link
      instruction: |
        두 파일을 수정하세요:
        1. /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/lib/db.ts — TimeEntry에 estimateId 필드 추가
        2. /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/app/time-tracking/page.tsx — 견적 연동 UI 추가

        ## 프로젝트 컨텍스트
        - Next.js 16+ App Router, TypeScript, Tailwind CSS, Shadcn UI
        - "use client" 컴포넌트
        - LocalEstimate: { id, estimateNumber, clientName, totalAmount, status, ... } — lib/estimates-storage에서 import
        - 현재 TimeEntry: { id, projectName?, startTime, endTime?, duration?, date }

        ## lib/db.ts 변경
        TimeEntry 인터페이스에 필드 추가:
        interface TimeEntry {
          // 기존 필드 유지
          estimateId?: string   // 연결된 견적 ID
          estimateNumber?: string  // 표시용 견적 번호
        }

        ## app/time-tracking/page.tsx 변경 시그니처
        // 추가할 state
        const [estimates, setEstimates] = useState<LocalEstimate[]>([])
        const [selectedEstimateId, setSelectedEstimateId] = useState<string>("")

        // 추가할 함수
        async function loadEstimates(): Promise<void>  // getEstimates() 호출하여 sent/paid만 필터링

        ## 요구사항
        - lib/db.ts: TimeEntry에 estimateId?, estimateNumber? 추가 (기존 필드 수정 금지)
        - time-tracking/page.tsx:
          - 컴포넌트 마운트 시 getEstimates()로 sent/paid 상태 견적 불러오기
          - 타이머 시작 전 "연결할 견적 선택" select 드롭다운 표시
          - 드롭다운: "선택 안 함" + sent/paid 견적 목록 (estimateNumber + clientName)
          - handleStart 수정: selectedEstimateId가 있으면 estimateId, estimateNumber 포함하여 저장
          - 완료된 타임 엔트리 목록에서 estimateNumber 있으면 "📋 #{estimateNumber}" 배지 표시
        - getEstimates import: import { getEstimates, LocalEstimate } from '@/lib/estimates-storage'

        ## 제약사항
