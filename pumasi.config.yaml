pumasi:
  defaults:
    command: "codex exec --dangerously-bypass-approvals-and-sandbox --ephemeral"
    emoji: "🤖"

  tasks:
    - name: progress-stepper
      instruction: |
        /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/estimate-progress-stepper.tsx 파일을 새로 생성하세요.

        ## 프로젝트 컨텍스트
        - Next.js 16+ App Router, TypeScript, Tailwind CSS, Shadcn UI
        - "use client" 컴포넌트
        - 5단계 흐름: input → transcribing → verifying → generating → result

        ## 타입 정의
        type EstimateStep = "input" | "transcribing" | "verifying" | "generating" | "result"

        interface EstimateProgressStepperProps {
          currentStep: EstimateStep
        }

        ## 시그니처
        export function EstimateProgressStepper(props: EstimateProgressStepperProps): JSX.Element | null

        ## 요구사항
        - "input" 단계에서는 null 반환 (초기 화면에서는 숨김)
        - 나머지 4단계에서 상단에 가로 스테퍼 표시
        - 각 단계별 라벨:
          - transcribing: "🎙 분석 중"
          - verifying: "✏️ 확인"
          - generating: "⚡ 생성 중"
          - result: "✅ 완료"
        - 현재 단계는 강조(텍스트 흰색 + 파란 배경 pill)
        - 완료된 단계는 체크 표시(✓) + 파란색 텍스트
        - 미완료 단계는 회색 텍스트
        - 단계 사이 구분선(›) 표시
        - Tailwind CSS 사용, 모바일 우선 디자인
        - 배경: bg-background/80 backdrop-blur, 상단 고정 스타일

        ## 제약사항
        - "use client" 선언 필수
        - 외부 라이브러리 추가 금지 (lucide-react, Tailwind만 사용)
        - TypeScript strict, any 금지

      gates:
        - name: "파일 존재"
          command: "[ -f '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/estimate-progress-stepper.tsx' ]"
        - name: "EstimateProgressStepper export 존재"
          command: "grep -q 'EstimateProgressStepper' '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/estimate-progress-stepper.tsx'"
        - name: "5개 step 처리"
          command: "grep -q 'transcribing' '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/estimate-progress-stepper.tsx' && grep -q 'generating' '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/estimate-progress-stepper.tsx'"
        - name: "타입 체크"
          command: "cd '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)' && npx tsc --noEmit 2>&1 | grep -v node_modules | grep -c 'error' | xargs -I{} test {} -eq 0"

    - name: pricelist-autocomplete
      instruction: |
        /Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/pricelist-autocomplete.tsx 파일을 새로 생성하세요.

        ## 프로젝트 컨텍스트
        - Next.js 16+ App Router, TypeScript, Tailwind CSS, Shadcn UI
        - "use client" 컴포넌트
        - PriceListItem 타입: { id, name, price, unit, category, keywords, description?, usageCount }
        - getPriceList(): Promise<PriceListItem[]> — lib/db에서 import

        ## 공통 타입
        import type { PriceListItem } from '@/types'
        import { getPriceList } from '@/lib/db'

        ## 타입 정의
        interface PriceListAutocompleteProps {
          value: string
          onChange: (value: string) => void
          onSelect: (item: PriceListItem) => void
          placeholder?: string
          className?: string
        }

        ## 시그니처
        export function PriceListAutocomplete(props: PriceListAutocompleteProps): JSX.Element

        ## 요구사항
        - Input 필드 렌더링 (value/onChange 연결)
        - 사용자 입력 시 getPriceList()로 불러온 항목 중 name/keywords 기준 fuzzy 검색 (toLowerCase 포함 여부 확인)
        - 검색 결과를 드롭다운 팝오버로 표시 (최대 6개)
        - 각 항목 표시: name (bold) + price + unit + category badge
        - 항목 선택 시 onSelect 콜백 호출 후 드롭다운 닫기
        - 드롭다운 외부 클릭 시 닫힘 (useEffect + mousedown 이벤트)
        - 항목 없으면 드롭다운 미표시
        - AI 참조 표시: 매칭된 항목 옆에 "💡 가격표" 배지 표시
        - Tailwind CSS, 다크 테마 호환

        ## 제약사항
        - "use client" 선언 필수
        - TypeScript strict, any 금지
        - 추가 라이브러리 설치 금지 (Shadcn Input, Tailwind만)

      gates:
        - name: "파일 존재"
          command: "[ -f '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/pricelist-autocomplete.tsx' ]"
        - name: "PriceListAutocomplete export 존재"
          command: "grep -q 'PriceListAutocomplete' '/Users/kim-young-gwang/Desktop/SnapQuote (Trade-Focused AI Estimator)/components/pricelist-autocomplete.tsx'"
        - name: "onSelect prop 존재"
